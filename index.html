	<script>
		function OpenTab(urlpre,sitename){
			var urlsuf = document.forms["SearchForm"][sitename].value.toString()
			var tmp = ""
			for(var i = 0 ; i < urlsuf.length ; ++i)
			{
				if(urlsuf[i] != '+')
				{
					tmp = tmp + urlsuf[i]
				}else
				{
					tmp = tmp + "%2B"
				}
			}
			var url = urlpre + tmp
			if(sitename == "cpp"){
				url = url + " site:en.cppreference.com"
			}
			location.assign(url)
		}
	</script>

				"scale": 1
			},
			"display": {
				"position": "right", //模型的表现位置
				"width": 150,  //模型的宽度
				"height": 360, //模型的高度
				"hOffset": 0,
				"vOffset": -20
			},
			"mobile": {
				"show": true,
				"scale": 0.5
			},
			"react": {
				"opacityDefault": 1.0,  //模型默认透明度
				"opacityOnHover": 0.2
			}
		});
	</script>
	<script>
		fetch('https://v1.hitokoto.cn/?c=i', {
			method: 'GET',
			headers: {
			},
			mode: 'cors',

				sign.innerHTML = "  " + content

			})
	</script>
